{% extends 'base.html' %}

{% block content %}
<h2>Timeline</h2>

<img src="{{ url_for('static', path='twitter.gif') }}" class="gif">

{% for message in messages %}
    <div>
        <p><em>@{{ message.username }}</em>, Age: {{ message.age }}</p>
        <p>{{ message.message }}</p>
        <p>{{ message.created_at }}</p>
    </div>
{% endfor %}
{% endblock %}
